<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="csrf-token" content="" id="csrf-token" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>ePOS-領収書印刷</title>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script type="text/javascript">
<!--
    let CONFIG = {};
    let currentUser = null;
    let receiptTemplate = '';

    async function loadConfig() {
        try {
            // ✷ アプリ設定・Firebase 設定・領収書テンプレートを並列取得
            const [configRes, firebaseRes, templateRes] = await Promise.all([
                fetch('./config/config.json'),
                fetch('/api/firebase-config'),
                fetch('/templates/receipt.xml'),
            ]);
            if (!configRes.ok) {
                throw new Error('設定ファイルの読み込みに失敗しました');
            }
            if (!firebaseRes.ok) {
                throw new Error('Firebase設定の取得に失敗しました');
            }
            if (!templateRes.ok) {
                throw new Error('領収書テンプレートの取得に失敗しました');
            }
            CONFIG = await configRes.json();
            const firebaseConfig = await firebaseRes.json();
            receiptTemplate = await templateRes.text();

            firebase.apps.forEach(app => app.delete());
            firebase.initializeApp(firebaseConfig);

            checkAuthState();
            document.getElementById('amount').value = CONFIG.amount;
            updateConfigDisplay();
        } catch (error) {
            console.error('設定読み込みエラー:', error);
            alert('設定ファイルの読み込みに失敗しました: ' + error.message);
        }
    }

    // ✷ allowedEmails のチェックはサーバー側（セッション認証）で実施済み
    function checkAuthState() {
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginStatus').textContent =
                    `ログイン中: ${user.email}`;
                document.getElementById('printButton').disabled = false;
            } else {
                currentUser = null;
                document.getElementById('loginStatus').textContent =
                    'ログインしていません';
                document.getElementById('printButton').disabled = true;
            }
        });
    }

    async function login() {
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebase.auth().signInWithPopup(provider);
        } catch (error) {
            console.error('ログインエラー:', error);
            alert('ログインに失敗しました: ' + error.message);
        }
    }

    async function logout() {
        try {
            await firebase.auth().signOut();
        } catch (error) {
            console.error('ログアウトエラー:', error);
            alert('ログアウトに失敗しました: ' + error.message);
        }
    }

    window.onload = loadConfig;

    function updateConfigDisplay() {
        const currentTime = formatDateTime(new Date());
        document.getElementById('currentConfig').textContent =
            `現在の設定: IP=${CONFIG.printerIP}, 金額=${CONFIG.amount}円, UUID=${CONFIG.uuid || '未生成'}, 時刻=${currentTime}`;
    }

    async function generateUUIDv7() {
        try {
            const response = await fetch('./api/generate-uuid');
            if (!response.ok) {
                throw new Error(`UUIDの取得に失敗しました (${response.status})`);
            }
            const data = await response.json();
            if (!data.uuid) {
                throw new Error('無効なUUIDレスポンス');
            }
            return data.uuid;
        } catch (error) {
            console.error('UUID取得エラー:', error);
            alert('UUIDの取得に失敗しました: ' + error.message);
            throw error;
        }
    }

    function getPrinterUrl() {
        return `${CONFIG.protocol}://${CONFIG.printerIP}/cgi-bin/epos/service.cgi?devid=${CONFIG.devid}&timeout=10000`;
    }

    function validateAmount(value) {
        const amount = parseInt(value);
        if (isNaN(amount) || amount > 20000 || amount < 0) {
            alert('金額は0から20,000円の間で入力してください。');
            return false;
        }
        return true;
    }

    function toFullWidth(num) {
        return num.toString().replace(/[0-9]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) + 0xFEE0);
        }).replace(/,/g, '，');
    }

    function formatDateTime(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        const weekday = weekdays[date.getDay()];
        return `${year}年${month}月${day}日(${weekday})${hours}:${minutes}`;
    }

    function formatAmount(amount) {
        return '￥' + toFullWidth(amount.toLocaleString()) + 'ー';
    }

    async function updateConfig() {
        const newAmount = document.getElementById('amount').value;
        if (!validateAmount(newAmount)) return;

        CONFIG.amount = newAmount;
        CONFIG.uuid = await generateUUIDv7();

        updateConfigDisplay();
    }

    // ✷ テンプレートのプレースホルダを置換してePOS-Print XMLボディを生成
    function renderReceiptXML(vars) {
        let xml = receiptTemplate;
        for (const [key, value] of Object.entries(vars)) {
            xml = xml.replaceAll('{{.' + key + '}}', value);
        }
        return xml;
    }

    // ✷ SOAPエンベロープでラップ（Go側の wrapSOAPEnvelope と同一）
    function wrapSOAPEnvelope(eposBody) {
        return '<?xml version="1.0" encoding="utf-8"?>' +
            '<s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/">' +
            '<s:Body>' +
            '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">' +
            eposBody +
            '</epos-print>' +
            '</s:Body>' +
            '</s:Envelope>';
    }

    // ✷ プリンタにSOAP/XMLを送信してレスポンスをパース
    function sendToPrinter(url, soapXML) {
        return new Promise(function(resolve, reject) {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'text/xml; charset=utf-8');
            xhr.setRequestHeader('SOAPAction', '""');
            xhr.timeout = 30000;
            xhr.onload = function() {
                const res = xhr.responseText;
                const success = /success\s*=\s*"\s*(1|true)\s*"/.test(res);
                resolve({ success: success, response: res });
            };
            xhr.onerror = function() {
                reject(new Error('プリンタ通信エラー'));
            };
            xhr.ontimeout = function() {
                reject(new Error('プリンタ通信タイムアウト'));
            };
            xhr.send(soapXML);
        });
    }

    async function button1_Click() {
        if (!currentUser) {
            alert('ログインが必要です');
            return;
        }

        try {
            const idToken = await currentUser.getIdToken();
            const printButton = document.getElementById('printButton');
            printButton.disabled = true;

            await updateConfig();
            const url = getPrinterUrl();
            console.log('プリンターURL:', url);

            const currentDateTime = formatDateTime(new Date());

            // ✷ テンプレートから印刷XML生成（templates/receipt.xml を使用）
            const eposBody = renderReceiptXML({
                UUID: CONFIG.uuid,
                Amount: formatAmount(parseInt(CONFIG.amount)),
                Datetime: currentDateTime,
                ReceiptURL: CONFIG.receiptURL + CONFIG.uuid,
                IssuerName: CONFIG.issuerName,
                Address: CONFIG.address,
                Phone: CONFIG.phone
            });
            const soapXML = wrapSOAPEnvelope(eposBody);

            // ✷ プリンタに直接送信
            const result = await sendToPrinter(url, soapXML);
            printButton.disabled = false;

            if (result.success) {
                try {
                    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
                    if (!csrfToken) {
                        throw new Error('CSRFトークンが見つかりません');
                    }

                    const saveResponse = await fetch('/api/save-receipt', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${idToken}`,
                            'X-CSRF-Token': csrfToken
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            uuid: CONFIG.uuid,
                            amount: CONFIG.amount,
                            datetime: currentDateTime,
                            phone: CONFIG.phone,
                            address: CONFIG.address,
                            issuerName: CONFIG.issuerName
                        })
                    });

                    if (!saveResponse.ok) {
                        const errorData = await saveResponse.json();
                        throw new Error(errorData.error || '印刷データの保存に失敗しました');
                    }
                    alert('印刷が完了しました');
                } catch (saveError) {
                    console.error('データ保存エラー:', saveError);
                    alert('印刷は成功しましたが、データの保存に失敗しました: ' + saveError.message);
                }
            } else {
                console.error('印刷エラー:', result.response);
                alert('印刷に失敗しました');
            }

        } catch (error) {
            console.error('エラーが発生しました:', error);
            alert('エラーが発生しました: ' + error.message);
            document.getElementById('printButton').disabled = false;
        }
    }

//-->
</script>
</head>

<body>
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div id="loginStatus" style="margin-bottom: 20px;"></div>
        <button onclick="login()">ログイン</button>
        <button onclick="logout()">ログアウト</button>

        <h2>設定</h2>
        <div style="margin-bottom: 20px;">
            <label>金額：</label>
            <input type="number" id="amount" value="20000" max="20000"><br>
        </div>

        <div id="currentConfig" style="margin-bottom: 20px;"></div>

        <div style="text-align: center;">
            <button id="printButton" onclick="button1_Click()" style="padding: 10px 20px;" disabled>印刷</button>
        </div>
    </div>

</body>
</html>
